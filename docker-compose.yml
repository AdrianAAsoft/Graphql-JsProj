version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: Backend
    restart: always  #if a problem it should always restart
    ports:  #machine port: docker port
      - "4000:4000"
    depends_on:
      - db
    environment:  #env variables 
      - dbhost=db

volumes:
  db_data: